<body class="min-h-screen flex flex-col items-center justify-between font-body-md bg-background selection:bg-primary-container selection:text-on-primary-container"><!-- Header Section -->
<header class="w-full flex justify-center py-stack-lg animate-fade-in">
<h1 class="font-display-xl text-display-xl font-extrabold text-primary-fixed tracking-tight">SetaraApp</h1>
</header>
<!-- Main Login Card -->
<main class="w-full max-w-[440px] px-margin-page flex flex-col justify-center gap-stack-lg">
<div class="text-center">
<h2 class="font-headline-lg text-headline-lg text-primary mb-2">Selamat Datang</h2>
<p class="font-body-md text-on-surface-variant opacity-80">Silakan masuk ke akun Anda</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email / Phone -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface ml-1">Email / Nomor Telepon</label>
<div class="soft-well border border-outline/30 rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">mail</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md placeholder:text-outline/50" placeholder="user@email.com atau 0812..." type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface ml-1">Kata Sandi</label>
<div class="soft-well border border-outline/30 rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">lock</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md placeholder:text-outline/50" placeholder="Min. 8 karakter" type="password"/>
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-primary" id="password-toggle">visibility_off</span>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end -mt-2">
<a class="text-sm font-medium text-primary-fixed hover:underline" href="#">Lupa Sandi?</a>
</div>
<!-- Primary Action -->
<button class="w-full mt-4 bg-primary-fixed text-on-primary-fixed font-headline-md py-4 rounded-full shadow-lg hover:brightness-110 active:scale-95 transition-all flex justify-center items-center gap-2">
            Masuk
        </button>
</form>
<!-- Social Login Separator -->
<div class="flex items-center gap-4 py-2">
<div class="h-px bg-outline/20 flex-grow"></div>
<span class="font-label-bold text-on-surface-variant text-sm">atau masuk dengan</span>
<div class="h-px bg-outline/20 flex-grow"></div>
</div>
<!-- Google Login -->
<button class="w-full bg-surface-container border border-outline/20 text-on-surface font-body-lg py-4 rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-high transition-colors active:scale-[0.98]">
<img alt="Google" class="w-6 h-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_f9yXRqet_AG1MIv099VKx1olbHqRxi4o4porVEEGY9WxSuAddupQtZfMyEceYgwMdBe__rtmYJuUyzmOokXHCVFaS53B2pQbajx3fO9Mt1iZ0RgSOierleP7xSNLqHMt_qH7kSxubg4B6-PYhh8NPLt7L556LrekiyNb5xoQ_4OGNY2XiPdiNX5DqyJOuA9b6YPBKCyx7nRDGMvOwJzShY4qmemz8m8nAaAjlqo4ncavlqwY9rOdYCchZ06fgdjNBvN8BEh0F20"/>
        Masuk dengan Google
    </button>
</main>
<!-- Footer Section -->
<footer class="w-full py-stack-lg text-center mt-auto">
<p class="font-body-md text-on-surface-variant">
        Belum punya akun? 
        <a class="text-primary-fixed font-label-bold underline decoration-primary-fixed/30 hover:decoration-primary-fixed transition-all ml-1" href="#">Daftar</a>
</p>
</footer>
<script>
    // Password Visibility Toggle
    const toggleBtn = document.getElementById('password-toggle');
    if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
            const input = this.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                this.textContent = 'visibility';
            } else {
                input.type = 'password';
                this.textContent = 'visibility_off';
            }
        });
    }
</script></body></html>
