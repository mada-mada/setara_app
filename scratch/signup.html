<!DOCTYPE html>

<html class="dark" lang="id"><head>

        }

                        "on-primary-fixed": "#221b00",
                        "inverse-surface": "#e8e2d8",
                        "tertiary-container": "#9feffb",
                        "on-secondary-fixed-variant": "#00513a",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="min-h-screen flex flex-col items-center justify-between font-body-md bg-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Header Section -->
<header class="w-full flex justify-center py-stack-lg animate-fade-in">
<h1 class="font-headline-xl text-headline-xl font-extrabold text-primary-fixed tracking-tight">SetaraApp</h1>
</header>
<!-- Main Registration Card -->
<main class="w-full max-w-[440px] px-margin-page flex flex-col justify-center gap-stack-lg">
<div class="text-center">
<h2 class="font-headline-lg text-headline-lg text-primary mb-2">Buat Akun Baru</h2>
<p class="font-body-md text-on-surface-variant opacity-80">Silakan lengkapi data untuk mendaftar.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface ml-1">Nama Lengkap</label>
<div class="soft-well border border-outline/30 rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">person</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md placeholder:text-outline/50" placeholder="Masukkan nama lengkap" type="text"/>
</div>
</div>
<!-- Email / Phone -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface ml-1">Email / Nomor Telepon</label>
<div class="soft-well border border-outline/30 rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">mail</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md placeholder:text-outline/50" placeholder="user@email.com atau 0812..." type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface ml-1">Kata Sandi</label>
<div class="soft-well border border-outline/30 rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">lock</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md placeholder:text-outline/50" placeholder="Min. 8 karakter" type="password"/>
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-primary">visibility_off</span>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface ml-1">Konfirmasi Kata Sandi</label>
<div class="soft-well border border-outline/30 rounded-xl px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">lock_reset</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md placeholder:text-outline/50" placeholder="Ulangi kata sandi" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full mt-4 bg-primary-fixed text-on-primary-fixed font-headline-md py-4 rounded-full shadow-lg hover:brightness-110 active:scale-95 transition-all flex justify-center items-center gap-2">
                Daftar
            </button>
</form>
<!-- Social Login Separator -->
<div class="flex items-center gap-4 py-2">
<div class="h-px bg-outline/20 flex-grow"></div>
<span class="font-label-bold text-on-surface-variant text-sm">atau daftar dengan</span>
<div class="h-px bg-outline/20 flex-grow"></div>
</div>
<!-- Google Login -->
<button class="w-full bg-surface-container border border-outline/20 text-on-surface font-body-lg py-4 rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-high transition-colors active:scale-[0.98]">
<img alt="Google" class="w-6 h-6" data-alt="A clean, high-resolution graphic of the official Google G logo icon with its signature four-color palette of blue, red, yellow, and green. The icon is rendered with a slight soft focus and set against a dark, minimalist UI background that emphasizes clarity and accessibility. The lighting is subtle, creating a professional and trusted digital environment consistent with high-end app authentication screens." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_f9yXRqet_AG1MIv099VKx1olbHqRxi4o4porVEEGY9WxSuAddupQtZfMyEceYgwMdBe__rtmYJuUyzmOokXHCVFaS53B2pQbajx3fO9Mt1iZ0RgSOierleP7xSNLqHMt_qH7kSxubg4B6-PYhh8NPLt7L556LrekiyNb5xoQ_4OGNY2XiPdiNX5DqyJOuA9b6YPBKCyx7nRDGMvOwJzShY4qmemz8m8nAaAjlqo4ncavlqwY9rOdYCchZ06fgdjNBvN8BEh0F20"/>
            Daftar dengan Google
        </button>
</main>
<!-- Footer Section -->
<footer class="w-full py-stack-lg text-center">
<p class="font-body-md text-on-surface-variant">
            Sudah punya akun? 
            <a class="text-primary-fixed font-label-bold underline decoration-primary-fixed/30 hover:decoration-primary-fixed transition-all ml-1" href="#">Masuk</a>
</p>
</footer>
<!-- Interactive Layer -->
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-1', 'ring-secondary-fixed-dim');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-1', 'ring-secondary-fixed-dim');
            });
        });

        // Simple visibility toggle logic
        const toggleIcon = document.querySelector('.material-symbols-outlined.cursor-pointer');
        toggleIcon.addEventListener('click', function() {
            const passInput = this.previousElementSibling;
            if (passInput.type === 'password') {
                passInput.type = 'text';
                this.textContent = 'visibility';
            } else {
                passInput.type = 'password';
                this.textContent = 'visibility_off';
            }
        });
    </script>
</body></html>
